<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
</head>
<body>

    <main class="container">
    <div class="image-container">
        <img src="redmont.jpg" class="red-mont" alt="">
    </div>

    <div class="form-content">
        <div class="description">
            <p>This is not a real service! Sign up to get started in this incredible journey and to achieve the revolution!.
                Let's do this <em>comrade!</em></p>
        </div>

        <h2>Sign Up!</h2>

        <form action="#" class="form">

            <div class="inputs">
                <label for="first-name">First Name</label>
                <input placeholder="First name" type="text" name="first-name" id="first-name" required>
            </div>
            
            <div class="inputs">
                <label for="last-name">Last Name</label>
                <input placeholder="Last name" type="text" name="last-name" id="last-name" required>
            </div>

            <div class="inputs">
                <label for="email">Email</label>
                <input placeholder="johndoe@email.com" type="email" name="email" id="email" required>
            </div>

            <div class="inputs">
                <label for="phone-number">Phone number</label>
                <input placeholder="Phone number" type="number" name="phone-number" id="phone-number" required>
            </div>

            <div class="inputs">
                <label for="password">Password</label>
                <input placeholder="Password" type="password" name="password" id="password" required>
            </div>
            <div class="inputs">
                <label for="confirmPassword">Confirm Password</label>
                <input placeholder="Confirm Password" type="password" name="confirmPassword" id="confirmPassword" required>
            </div>

            <div>
                <button type="submit">Create account</button>
            </div>
        </form>

        <footer>
            <p>Already have an account?<a href="#">Log in</a></p>
        </footer>

    </div>
</main>
</body>
</html>
